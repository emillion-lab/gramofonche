name: Обнови каталога

on:
  schedule:
    - cron: "0 4 * * 1"   # всеки понеделник 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4

      - name: Scrape приказки
        env:
          GRAMO_PROXY: "https://mvr-proxy.mihov-emil.workers.dev/mvrfetch?u="
        run: python3 gramofonche.py scrape --all --delay 1.5

      - name: Build index.html
        run: python3 gramofonche.py build

      - name: Commit
        run: |
          git config user.name "gramofonche-bot"
          git config user.email "actions@github.com"
          git add data/albums.json index.html
          git diff --cached --quiet || git commit -m "Каталог: обновяване $(date +%F)"
          git push
