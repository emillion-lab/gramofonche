<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Грамофонче — каталог по дължина</title>
<style>
:root{
  --bg:#1B4A44;        /* тъмнозелен картон на стара плоча */
  --card:#F6EEDC;      /* пожълтял обков */
  --ink:#22221E;
  --label:#D6452B;     /* червен етикет БалканТон */
  --label2:#E8A93B;    /* горчица */
  --muted:#6E6A5C;
  --line:#D9CDAE;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:16px/1.45 -apple-system,"Segoe UI",Roboto,sans-serif}
header{padding:22px 16px 10px;color:#F3ECD8;text-align:center}
header h1{margin:0;font-family:Georgia,'Times New Roman',serif;font-size:1.7em;letter-spacing:.5px}
header p{margin:6px 0 0;opacity:.75;font-size:.85em}
.controls{position:sticky;top:0;background:var(--bg);padding:10px 12px 12px;z-index:5;
  box-shadow:0 4px 10px rgba(0,0,0,.25)}
.controls input{width:100%;padding:11px 14px;border:0;border-radius:24px;font-size:1em;
  background:var(--card);color:var(--ink)}
.chips{display:flex;gap:8px;overflow-x:auto;padding-top:10px;-webkit-overflow-scrolling:touch}
.chip{flex:0 0 auto;padding:7px 14px;border-radius:20px;border:1.5px solid rgba(246,238,220,.5);
  color:#F3ECD8;font-size:.85em;background:transparent;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--label2);border-color:var(--label2);color:#22221E;font-weight:600}
.meta-line{color:#F3ECD8;opacity:.7;font-size:.8em;padding:8px 4px 0}
main{max-width:760px;margin:0 auto;padding:12px}
.album{display:flex;gap:14px;background:var(--card);border-radius:14px;padding:12px;
  margin-bottom:10px;align-items:flex-start}
.disc{flex:0 0 64px;width:64px;height:64px;border-radius:50%;position:relative;
  background:radial-gradient(circle at 35% 35%, #3a3a38 0 8%, #191917 60%, #2c2c2a 100%);
  box-shadow:inset 0 0 0 2px #000, 0 2px 5px rgba(0,0,0,.3)}
.disc::after{content:"";position:absolute;inset:0;border-radius:50%;
  background:repeating-radial-gradient(circle, transparent 0 3px, rgba(255,255,255,.04) 3px 4px)}
.disc .lbl{position:absolute;inset:16px;border-radius:50%;background:var(--label);
  color:#FFF4DC;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-weight:700;font-size:.78em;line-height:1;z-index:1}
.disc .lbl small{font-weight:400;font-size:.62em;opacity:.85;margin-top:2px}
.disc.long .lbl{background:#8E3B24}
.disc.q .lbl{background:#7A766A}
.info{flex:1;min-width:0}
.info h2{margin:0 0 3px;font-family:Georgia,serif;font-size:1.02em;line-height:1.3}
.info .sub{color:var(--muted);font-size:.8em}
.info .sub b{color:var(--label);font-weight:600}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:7px;font-size:.8em}
.row a{color:var(--label);text-decoration:none;font-weight:600}
.row .tgl{color:var(--muted);cursor:pointer;text-decoration:underline dotted}
.tracks{display:none;margin:8px 0 0;padding:8px 0 0;border-top:1px dashed var(--line);
  font-size:.82em;color:#4A473C}
.tracks.open{display:block}
.tracks span{display:inline-block;margin:0 8px 4px 0}
.tracks span::before{content:"♪ ";color:var(--label2)}
.empty{color:#F3ECD8;text-align:center;padding:40px 20px;opacity:.8}
footer{color:#F3ECD8;opacity:.6;text-align:center;font-size:.75em;padding:20px}
footer a{color:var(--label2)}
@media(min-width:560px){.info h2{font-size:1.1em}}
.play{background:var(--label);color:#FFF4DC;border:0;border-radius:16px;
  padding:6px 13px;font-weight:700;font-size:.95em;cursor:pointer}
.play:active{transform:scale(.96)}
.tr{color:var(--label);cursor:pointer;text-decoration:underline dotted}
#player{position:fixed;bottom:0;left:0;right:0;display:none;gap:12px;align-items:center;
  background:#161613;padding:10px 14px;z-index:9;box-shadow:0 -4px 12px rgba(0,0,0,.4)}
#player .pdisc{flex:0 0 44px;width:44px;height:44px;border-radius:50%;position:relative;
  background:radial-gradient(circle at 35% 35%, #3a3a38 0 8%, #191917 60%, #2c2c2a 100%);
  box-shadow:inset 0 0 0 2px #000}
#player .pdisc::after{content:"";position:absolute;inset:14px;border-radius:50%;background:var(--label)}
#player.spin .pdisc{animation:rot 3s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#player .pinfo{flex:1;min-width:0}
#player #ptitle{color:#F3ECD8;font-size:.82em;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-bottom:4px}
#player audio{width:100%;height:34px}
#player .pclose{background:none;border:0;color:#F3ECD8;font-size:1.3em;cursor:pointer;opacity:.7}
</style>
</head>
<body>
<header>
  <h1>🎙 Грамофонче — каталог</h1>
  <p>приказки за слушане, подредени по дължина · записи от БалканТон и радиотеатър</p>
</header>

<div class="controls">
  <input id="q" type="search" placeholder="Търси заглавие, автор, запис…">
  <div class="chips" id="durChips">
    <button class="chip on" data-d="all">Всички</button>
    <button class="chip" data-d="0-10">до 10 мин</button>
    <button class="chip" data-d="10-30">10–30 мин</button>
    <button class="chip" data-d="30-60">30–60 мин</button>
    <button class="chip" data-d="60-9999">над 1 час</button>
    <button class="chip" data-d="sort" id="sortBtn">↕ най-кратки първо</button>
  </div>
  <div class="meta-line" id="stats"></div>
</div>

<main id="list"></main>
<div class="empty" id="empty" style="display:none">Нищо не е намерено.</div>

<div id="player">
  <div class="pdisc"></div>
  <div class="pinfo">
    <div id="ptitle"></div>
    <audio id="paudio" controls preload="none"></audio>
  </div>
  <button class="pclose" id="pclose">✕</button>
</div>

<footer>
  Каталог с метаданни и линкове. Записите се слушат в
  <a href="https://gramofonche.chitanka.info/">Грамофончето</a> (Свилен Добрев / chitanka.info).<br>
  Обновено: <span id="gen"></span>
</footer>

let durFilter="all", sortAsc=true;
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");

function qualityNice(q){
  if(!q) return "";
  return q.replace(/\+/g,"хубаво").replace(/~/g,"средно").replace(/-/g,"слабо").replace(/\?/g,"?")
          .split("/").slice(0,1)[0];
}

function render(){
  const q=$("#q").value.toLowerCase().trim();
  let items=DATA.albums.filter(a=>{
    if(q){
      const hay=(a.title+" "+(a.author||"")+" "+(a.tracks||[]).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    if(durFilter!=="all"){
      const [lo,hi]=durFilter.split("-").map(Number);
      const m=a.minutes;
      if(m==null) return false;
      if(m<lo||m>hi) return false;
    }
    return true;
  });
  items.sort((a,b)=>{
    const am=a.minutes==null?1e9:a.minutes, bm=b.minutes==null?1e9:b.minutes;
    return sortAsc?am-bm:bm-am;
  });
  const totMin=items.reduce((s,a)=>s+(a.minutes||0),0);
  $("#stats").textContent=`${items.length} албума · общо ${Math.floor(totMin/60)} ч ${totMin%60} мин`;
  $("#empty").style.display=items.length?"none":"block";
  $("#list").innerHTML=items.map((a,i)=>{
    const m=a.minutes;
    const discCls=m==null?"q":(m>60?"long":"");
    const mLbl=m==null?"?":m;
    const bits=[];
    if(a.author) bits.push(a.author);
    if(a.kind) bits.push(a.kind);
    if(a.year) bits.push(a.year);
    if(a.quality) bits.push("качество: <b>"+qualityNice(a.quality)+"</b>");
    if(a.mb) bits.push(Math.round(a.mb)+" MB");
    const trk=(a.tracks||[]);
    const mp3=(a.mp3||[]);
    return `<article class="album">
      <div class="disc ${discCls}"><div class="lbl">${mLbl}<small>мин</small></div></div>
      <div class="info">
        <h2>${esc(a.title)}</h2>
        <div class="sub">${bits.join(" · ")}</div>
        <div class="row">
          ${mp3.length?`<button class="play" data-u="${esc(mp3[0].url)}" data-t="${esc(a.title)}">▶ Пусни</button>`:""}
          <a href="${a.url}" target="_blank" rel="noopener">↗ Грамофонче</a>
          ${trk.length>1?`<span class="tgl" data-i="${i}">${trk.length} записа</span>`:""}
        </div>
        ${trk.length>1?`<div class="tracks" id="t${i}">${
          mp3.length>1
            ? mp3.map(t=>{const n=t.name.replace(/\.mp3$/i,"");return `<span class="tr" data-u="${esc(t.url)}" data-t="${esc(n)}">${esc(n)}</span>`}).join("")
            : trk.map(t=>`<span>${esc(t)}</span>`).join("")
        }</div>`:""}
      </div>
    </article>`;
  }).join("");
  document.querySelectorAll(".tgl").forEach(el=>{
    el.onclick=()=>document.getElementById("t"+el.dataset.i).classList.toggle("open");
  });
}

$("#q").addEventListener("input",render);
document.querySelectorAll("#durChips .chip").forEach(c=>{
  c.onclick=()=>{
    if(c.dataset.d==="sort"){
      sortAsc=!sortAsc;
      c.textContent=sortAsc?"↕ най-кратки първо":"↕ най-дълги първо";
    }else{
      document.querySelectorAll("#durChips .chip:not(#sortBtn)").forEach(x=>x.classList.remove("on"));
      c.classList.add("on");
      durFilter=c.dataset.d;
    }
    render();
  };
});
// Плейър — стриймва директно от Грамофончето
const player=$("#player"),paudio=$("#paudio"),ptitle=$("#ptitle");
document.addEventListener("click",e=>{
  const b=e.target.closest(".play,.tr");
  if(!b)return;
  player.style.display="flex";
  document.body.style.paddingBottom="90px";
  ptitle.textContent=b.dataset.t;
  paudio.src=b.dataset.u;
  paudio.play();
});
paudio.addEventListener("play",()=>player.classList.add("spin"));
paudio.addEventListener("pause",()=>player.classList.remove("spin"));
$("#pclose").onclick=()=>{paudio.pause();player.style.display="none";document.body.style.paddingBottom="0"};

$("#gen").textContent=DATA.generated||"";
